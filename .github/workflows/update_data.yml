import cloudscraper
import json
import os
import time
import random
import logging
from datetime import datetime, timedelta

class SALottoScraper:

    def __init__(self):
        self.scraper = cloudscraper.create_scraper(
            browser={
                'browser': 'chrome',
                'platform': 'windows',
                'desktop': True
            }
        )

        self.base_url = "https://www.nationallottery.co.za/index.php?option=com_weaver&controller=lotto-history"
        self.data_dir = "data"
        self.cache_ttl = 1800  # 30 minutos

        os.makedirs(self.data_dir, exist_ok=True)

        logging.basicConfig(
            level=logging.INFO,
            format='[%(asctime)s] %(levelname)s: %(message)s'
        )

        self.user_agents = [
            # Rotação simples
            "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0 Safari/537.36",
            "Mozilla/5.0 (X11; Linux x86_64) Chrome/119.0.0.0 Safari/537.36",
            "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7) Chrome/118.0 Safari/537.36"
        ]

    # 🔥 Delay humano
    def human_delay(self):
        t = random.uniform(5, 15)
        logging.info(f"Aguardando {t:.2f}s...")
        time.sleep(t)

    # 🔥 Cache local
    def load_cache(self, name):
        path = f"{self.data_dir}/{name}.json"

        if not os.path.exists(path):
            return None

        with open(path, "r", encoding="utf-8") as f:
            data = json.load(f)

        last_update = datetime.strptime(data["last_update"], "%Y-%m-%d %H:%M:%S")

        if datetime.now() - last_update < timedelta(seconds=self.cache_ttl):
            logging.info(f"[CACHE] Usando dados recentes de {name}")
            return data["results"]

        return None

    def fetch_data(self, game_name):
        # 🔥 Verifica cache antes
        cache = self.load_cache(game_name.lower().replace(" ", "_"))
        if cache:
            return cache

        payload = {
            'gameName': game_name,
            'drawNumber': '',
            'isAjax': 'true'
        }

        headers = {
            'accept': 'application/json, text/javascript, */*; q=0.01',
            'user-agent': random.choice(self.user_agents),
            'x-requested-with': 'XMLHttpRequest',
            'referer': 'https://www.nationallottery.co.za/results/lotto'
        }

        for attempt in range(3):  # 🔁 retry
            try:
                logging.info(f"[TRY {attempt+1}] {game_name}")

                response = self.scraper.post(
                    self.base_url,
                    data=payload,
                    headers=headers,
                    timeout=30
                )

                if response.status_code != 200:
                    logging.warning(f"HTTP {response.status_code}")
                    self.human_delay()
                    continue

                content = response.json()

                if content.get('status') != 'success':
                    logging.warning("Resposta inválida do servidor")
                    self.human_delay()
                    continue

                data = content['data']['drawDetails']

                # 🔥 Validação básica
                if not data or len(data) == 0:
                    logging.warning("Dados vazios")
                    continue

                return data

            except Exception as e:
                logging.error(f"Erro: {str(e)}")

            self.human_delay()

        return None

    def save_data(self, name, data):
        filename = f"{self.data_dir}/{name.lower().replace(' ', '_')}.json"

        output = {
            "last_update": datetime.now().strftime("%Y-%m-%d %H:%M:%S"),
            "game": name,
            "results": data
        }

        with open(filename, 'w', encoding='utf-8') as f:
            json.dump(output, f, ensure_ascii=False, indent=4)

        logging.info(f"[SALVO] {filename}")

    def run(self):
        loterias = ["LOTTO", "POWERBALL", "DAILY LOTTO"]

        for lotto in loterias:
            result = self.fetch_data(lotto)

            if result:
                self.save_data(lotto, result)
            else:
                logging.error(f"[FALHA] {lotto}")

            self.human_delay()


if __name__ == "__main__":
    bot = SALottoScraper()
    bot.run()
