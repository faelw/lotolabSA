name: Update SA Lotto Data

on:
  schedule:
    - cron: '0 */6 * * *' # Roda a cada 6 horas
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 # Atualizado de v3 para v4

      - name: Setup Python
        uses: actions/setup-python@v5 # Atualizado de v4 para v5
        with:
          python-version: '3.11' # Versão mais estável para 2026

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push
        run: |
          git config --global user.name "Lotto Bot South Africa"
          git config --global user.email "bot@github.com"
          git add data/*.json
          # O "|| exit 0" evita que o workflow falhe se não houver novos sorteios
          git commit -m "Update Lotto Results: $(date)" || exit 0
          git push
