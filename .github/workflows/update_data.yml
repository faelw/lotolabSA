name: Update SA Lotto Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# ESSA É A CHAVE: Dá permissão para o Bot gravar os arquivos no seu Git
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Resolve o aviso do Node.js 20

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install cloudscraper; fi

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push
        run: |
          git config --global user.name "Lotto Bot SA"
          git config --global user.email "bot@github.com"
          git add data/*.json
          # Só faz o commit se houver mudanças reais nos arquivos
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Lotto Results: $(date)" && git push)
