name: Update SA Lotto Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cloudscraper requests

      - name: Run Scraper
        run: python scraper.py

      - name: Check files (Debug)
        run: ls -R data/ # Isso vai nos mostrar no log se os JSONs existem

      - name: Commit and Push
        run: |
          git config --global user.name "Lotto Bot SA"
          git config --global user.email "bot@github.com"
          
          # Criar a pasta data caso o scraper tenha falhado silenciosamente
          mkdir -p data
          touch data/.gitkeep 

          git add data/
          
          # Só faz o commit se houver mudanças reais
          if git diff --staged --quiet; then
            echo "Nada para atualizar."
          else
            git commit -m "Update Lotto Results: $(date)"
            git push
          fi
